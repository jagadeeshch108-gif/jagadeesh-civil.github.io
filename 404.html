<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Jagadeesh Chintalapudi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      background: var(--surface-1);
    }
    .error-num {
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 700; line-height: 1;
      color: var(--primary); opacity: .12;
      margin-bottom: -2rem;
    }
    .error-icon { font-size: 4rem; margin-bottom: 1rem; }
    .error-page h1 { font-size: 2rem; margin-bottom: .75rem; }
    .error-page p { max-width: 420px; margin: 0 auto 2rem; }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <div class="error-num">404</div>
      <div class="error-icon">🏗️</div>
      <h1>This Page Is Under Construction</h1>
      <p>Looks like this section hasn't been built yet — just like every great bridge, it takes time. Let's get you back on solid ground.</p>
      <a href="index.html" class="btn btn-primary">
        <i class="fas fa-home"></i> Back to Portfolio
      </a>
    </div>
  </div>
  <script src="assets/js/main.js"></script>
</body>
</html>
